<style>

body{

button:hover{

}

}

.whatsapp{
background:#25D366;
}

.footer{

}

</style>

</head>

<body>

<div class="header">
AUTO PROFIT SOFTWARE
</div>

<div class="box">

<h2>Earn Commission Forever</h2>

<p>
This software pays you every time someone joins using your link.
You get lifetime commission.
</p>

<p class="timer">
Offer ends in: <span id="countdown"></span>
</p>

</a>

<div class="box">

</div>


<script>

var countDownDate = new Date().getTime() + 86400000;

var x = setInterval(function() {

var now = new Date().getTime();

var distance = countDownDate - now;

var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
hours + "h "
+ minutes + "m "
+ seconds + "s ";

if (distance < 0) {
clearInterval(x);
document.getElementById("countdown").innerHTML = "Expired";
}

}, 1000);

</script>
